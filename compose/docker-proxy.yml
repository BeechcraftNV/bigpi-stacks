services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1 # Allow reading container status
      - SERVICES=1   # Allow reading service status
      - NETWORKS=1   # Allow reading network status
    networks:
      - proxy
    ports:
      - "2375:2375"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docker-proxy.rule=Host(`docker-proxy.${BASE_DOMAIN}`)"
      - "traefik.http.routers.docker-proxy.entrypoints=websecure"
      - "traefik.http.routers.docker-proxy.tls=true"
      - "traefik.http.services.docker-proxy.loadbalancer.server.port=2375"

networks:
  proxy:
    external: true
